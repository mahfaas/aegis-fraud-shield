spring:
  application:
    name: fraudshield

  datasource:
    url: jdbc:postgresql://localhost:5432/fraud_db
    username: admin
    password: rootpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: fraud-engine-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: io.github.mahfaas.fraudshield.model
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

fraud:
  rules:
    amount:
      decline-threshold: 500000
      review-threshold: 100000
    velocity:
      max-transactions: 5
      window-seconds: 60

  kafka:
    topic-in: transactions-raw
    topic-out: transactions-verdicted
    topic-dlq: transactions-dlq

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: fraudshield
